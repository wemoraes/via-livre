SUMÁRIO DO BRAND BOOK v2.0 — MAIO 2025

01 PRINCÍPIOS DA MARCA
  1. Dados acima de opinião — Aprovômetro é o diferencial. Números são protagonistas.
  2. Liberdade de escolha — "Via Livre" = caminho aberto. Aluno escolhe, não é designado.
  3. Energia de mobilidade — Mapas, rotas, progresso. Visual cinético, não estático.
  4. Autoridade acolhedora — Dados sérios + calor humano. Serif italic + verde "vai, tá seguro".

02 SISTEMA DE LOGO
  Ícone: arco de estrada + ponto. Arco = jornada. Ponto = aluno.
  Versões: Primário (verde), Invertido, Monocromático, Contorno, Favicon 32x32, Logotipo.
  Mínimo: 24px ícone, 120px logotipo. Espaço livre = raio do ponto (4px base).

03 SISTEMA DE CORES
  Primárias (verde OKLCH):
    50–950: oklch(97%→20% / 0.035→0.04 / 145)
    Accent: oklch(62% 0.18 145) — verde-500
  Neutros (subtom verde):
    50–950: oklch(99%→10% / 0.002→0.005 / 145)
  Semânticas:
    Success: oklch(62% 0.18 145)
    Warning: oklch(72% 0.16 75)
    Error:   oklch(60% 0.20 25)
    Info:    oklch(62% 0.15 230)
  Dark Mode: neutral-900 bg / neutral-800 surface / neutral-700 border. Accent inalterado.

04 TIPOGRAFIA
  Display: Instrument Serif italic (momentos editoriais)
  UI/Body: Plus Jakarta Sans (tudo mais)
  Mono:    JetBrains Mono (código, valores técnicos)
  Escala: 72/60/48/36/28/18/15/13/12px

05 ESPAÇAMENTO
  Grid: 8px base. 4px só para micro-ajustes.
  Tokens: 4/8/12/16/20/24/32/40/48/64/80/96px
  Radii: 6px sm / 10px md / 14px lg / 20px xl / full pill

06 MOVIMENTO
  Ease Out:  cubic-bezier(0.16,1,0.3,1) · 200ms — hover, focus, estados
  Spring:    cubic-bezier(0.34,1.56,0.64,1) · 350ms — gauge fills, entradas
  Smooth:    cubic-bezier(0.45,0,0.15,1) · 350ms — transições de página, scroll

07 COMPONENTES
  Botões: Primary (verde), Secondary, Ghost, Dark, Large, Small
  Badges: Success/Warning/Error/Info/Neutral
  Input: border neutral-200, focus ring 3px accent 10%
  Gauge Aprovômetro: barra horizontal, valor + unidade "aulas"
  Card Instrutor: avatar, nome, meta (DETRAN/anos/km), badges
  Regras: accent ≤2x por tela. Sombras tinted com verde. Hover: border neutral-300.
